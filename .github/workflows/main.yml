name: Blackshark Tweak Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos & SDK
        run: |
          # 1. Theos Kurulumu
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. SDK Kurulumu (Hata veren tar/xz kısmını düzelttik)
          mkdir -p $THEOS/sdks
          # Dosyayı önce tam indiriyoruz (-L yönlendirmeleri takip eder, -o dosyaya yazar)
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o $HOME/sdk.tar.xz
          # İndirilen dosyayı xz formatında açıyoruz
          tar -xJf $HOME/sdk.tar.xz -C $THEOS/sdks/
          
          # 3. İmzama Aracı (ldid)
          brew install ldid
          
          # 4. Değişkenleri GitHub ortamına kaydet
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Fix Framework Structure & Headers
        run: |
          # JRMemory klasör yapısını kontrol et ve düzenle
          mkdir -p JRMemory.framework/Headers
          if [ -f "JRMemory.framework/MemScan.h" ]; then
            mv JRMemory.framework/MemScan.h JRMemory.framework/Headers/
          fi
          # Kod içindeki include yollarını macOS uyumlu sed ile düzelt
          find Dolphins -name "*.mm" -exec sed -i '' 's|#include "JRMemory.framework/Headers/MemScan.h"|#import <JRMemory/MemScan.h>|g' {} +
          chmod +x JRMemory.framework/JRMemory || true

      - name: Build Blackshark Package
        run: |
          # Temizle ve derle (FINALPACKAGE=1 ile optimize et)
          make clean package FINALPACKAGE=1 FOR_RELEASE=1

      - name: Upload Artifact (V4)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blackshark-Tweak-Final
          path: packages/*.deb
