name: Blackshark Tweak Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos & SDK
        run: |
          # 1. Theos Kurulumu
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. SDK Kurulumu (Daha sağlam bir kaynaktan çekiyoruz)
          mkdir -p $THEOS/sdks
          curl -L "https://github.com/theos/sdks/archive/master.zip" -o sdks.zip
          unzip -q sdks.zip
          mv sdks-master/iPhoneOS14.5.sdk $THEOS/sdks/
          
          # 3. İmzama Aracı (ldid)
          brew install ldid
          
          # 4. Değişkenleri GitHub ortamına kaydet
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Fix Framework Structure & Headers
        run: |
          mkdir -p JRMemory.framework/Headers
          if [ -f "JRMemory.framework/MemScan.h" ]; then
            mv JRMemory.framework/MemScan.h JRMemory.framework/Headers/
          fi
          find Dolphins -name "*.mm" -exec sed -i '' 's|#include "JRMemory.framework/Headers/MemScan.h"|#import <JRMemory/MemScan.h>|g' {} +
          chmod +x JRMemory.framework/JRMemory || true

      - name: Build Blackshark Package
        run: |
          make clean package FINALPACKAGE=1 FOR_RELEASE=1

      - name: Upload Artifact (V4)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blackshark-Tweak-Final
          path: packages/*.deb
