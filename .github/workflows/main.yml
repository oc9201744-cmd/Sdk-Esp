name: Blackshark Tweak Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos & iOS SDK
        run: |
          # 1. Theos Kurulumu
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. iOS 14.5 SDK Kurulumu (Derleyici için gerekli olan sistem SDK'sı)
          git clone --depth=1 https://github.com/theos/sdks.git $THEOS/sdks_temp
          mv $THEOS/sdks_temp/iPhoneOS14.5.sdk $THEOS/sdks/
          rm -rf $THEOS/sdks_temp
          
          # 3. ldid kurulumu
          brew install ldid
          
          # Değişkenleri kaydet
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Extract Project SDK Zip
        run: |
          # SDK klasörü içindeki SDK.zip dosyasını açıyoruz
          if [ -f "SDK/SDK.zip" ]; then
            unzip -o SDK/SDK.zip -d SDK/
            echo "✅ SDK.zip başarıyla açıldı."
          else
            echo "❌ SDK/SDK.zip bulunamadı!"
            exit 1
          fi

      - name: Build Blackshark Package
        run: |
          # Makefile'ı çalıştır
          make clean package FINALPACKAGE=1 FOR_RELEASE=1

      - name: Upload Artifact (V4)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blackshark-DEB
          path: packages/*.deb
