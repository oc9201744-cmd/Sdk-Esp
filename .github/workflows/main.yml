name: Blackshark Tweak Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos & iOS SDK
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          git clone --depth=1 https://github.com/theos/sdks.git $THEOS/sdks_temp
          mv $THEOS/sdks_temp/iPhoneOS14.5.sdk $THEOS/sdks/
          
          # Substrate Header ve Library Dosyalarını Çekiyoruz (Kritik Adım)
          curl -L https://raw.githubusercontent.com/theos/headers/master/substrate.h -o $THEOS/include/substrate.h
          mkdir -p $THEOS/lib
          curl -L https://github.com/theos/lib/raw/master/libsubstrate.dylib -o $THEOS/lib/libsubstrate.dylib
          
          rm -rf $THEOS/sdks_temp
          brew install ldid
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Prepare Files
        run: |
          if [ -f "SDK/SDK.zip" ]; then
            unzip -o SDK/SDK.zip -d SDK/
          fi
          [ -f "ESP.plist" ] && cp ESP.plist Blackshark.plist || echo "Plist hazır."

      - name: Build Blackshark Package
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make clean package FINALPACKAGE=1 FOR_RELEASE=1

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blackshark-DEB
          path: packages/*.deb
