name: Blackshark Tweak Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos & iOS SDK
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          git clone --depth=1 https://github.com/theos/sdks.git $THEOS/sdks_temp
          mv $THEOS/sdks_temp/iPhoneOS14.5.sdk $THEOS/sdks/
          rm -rf $THEOS/sdks_temp
          brew install ldid
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Extract Project SDK Zip & Fix Plist
        run: |
          # 1. SDK Zip'i açıyoruz
          if [ -f "SDK/SDK.zip" ]; then
            unzip -o SDK/SDK.zip -d SDK/
            echo "✅ SDK.zip açıldı."
          fi
          
          # 2. KRİTİK HATA ÇÖZÜMÜ: ESP.plist'i Blackshark.plist olarak kopyala
          # Theos, TWEAK_NAME neyse o isimde plist bekler.
          if [ -f "ESP.plist" ]; then
            cp ESP.plist Blackshark.plist
            echo "✅ ESP.plist, Blackshark.plist olarak hazırlandı."
          else
            echo "❌ ESP.plist bulunamadı! Lütfen dosya adını kontrol et."
            exit 1
          fi

      - name: Build Blackshark Package
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make clean package FINALPACKAGE=1 FOR_RELEASE=1

      - name: Upload Artifact (V4)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Blackshark-DEB
          path: packages/*.deb
